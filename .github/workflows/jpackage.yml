name: Build Windows Installer with jpackage

on:
  push:
    tags: [ 'v*' ]

jobs:
  build:
    permissions:
      contents: write
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Build with Maven
        run: mvn clean package -DskipTests

      - name: Create Windows Installer with jpackage
        run: |
          $VERSION = "${{ github.ref_name }}".TrimStart('v')
          jpackage `
            --type exe `
            --input target/ `
            --main-jar TrackingBP-1.0-SNAPSHOT-jar-with-dependencies.jar `
            --main-class com.trackingbp.Main `
            --name TrackingBP `
            --app-version $VERSION `
            --vendor "Yoolica" `
            --description "TrackingBP" `
            --win-dir-chooser `
            --win-menu `
            --win-shortcut `
            --win-console `
            --dest dist/ `
            --verbose

      - name: List dist folder (debug)
        run: dir dist/

      - name: Upload Installer
        uses: actions/upload-artifact@v4
        with:
          name: TrackingBP-Setup
          path: dist/*.exe

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v1
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: dist/*.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}