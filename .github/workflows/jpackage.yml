name: Build Windows EXE

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Setup JDK 21 with JavaFX
        uses: actions/setup-java@v4
        with:
          distribution: 'liberica'
          java-version: '21'
          java-package: jdk+fx

      - name: Build Fat JAR
        run: mvn -f pom-github.xml clean compile assembly:single

      - name: Create EXE
        run: |
          jpackage `
            --input target `
            --main-jar TrackingBP-1.0.0-jar-with-dependencies.jar `
            --main-class com.trackingbp.Main `
            --name BloodPressureTracker `
            --type exe `
            --dest installer

      - name: Upload EXE
        uses: actions/upload-artifact@v4
        with:
          name: BloodPressureTracker
          path: installer/*.exe