name: Build Windows Installer with jpackage

on:
  push:
    tags: [ 'v*' ]

jobs:
  build:
    permissions:
      contents: write
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Download JavaFX SDK
        run: |
          Invoke-WebRequest -Uri "https://download2.gluonhq.com/openjfx/21.0.1/openjfx-21.0.1_windows-x64_bin-sdk.zip" -OutFile "javafx-sdk.zip"
          Expand-Archive -Path javafx-sdk.zip -DestinationPath .
          echo "JAVAFX_HOME=$((Get-Location).Path)\javafx-sdk-21.0.1" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Build JAR using pom-github.xml
        run: mvn -f pom-github.xml clean package

      - name: Create Windows Installer
        run: |
          $VERSION = "${{ github.ref_name }}".TrimStart('v')
          jpackage `
            --type exe `
            --input target `
            --main-jar TrackingBP-1.0.0.jar `
            --main-class com.trackingbp.Main `
            --name TrackingBP `
            --app-version $VERSION `
            --vendor "Yoolica" `
            --description "Blood Pressure Tracker" `
            --module-path "$env:JAVAFX_HOME\lib" `
            --add-modules javafx.controls,javafx.fxml `
            --win-dir-chooser `
            --win-menu `
            --win-shortcut `
            --dest dist/ `
            --verbose

      - name: Upload Installer
        uses: actions/upload-artifact@v4
        with:
          name: TrackingBP-Setup
          path: dist/*.exe

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v1
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: dist/*.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}