name: Build Windows EXE

on:
  push:
    tags: [ 'v*' ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Setup JDK 21 with JavaFX
        uses: actions/setup-java@v4
        with:
          distribution: 'liberica'
          java-version: '21'
          java-package: jdk+fx

      - name: Build Fat JAR
        run: mvn -f pom-github.xml clean compile assembly:single

      - name: Create EXE Installer
        run: |
          jpackage `
            --input target `
            --main-jar TrackingBP-1.0.0-jar-with-dependencies.jar `
            --main-class com.trackingbp.Main `
            --name BloodPressureTracker `
            --type exe `
            --dest installer `
            --verbose

      - name: Upload EXE as Artifact
        uses: actions/upload-artifact@v4
        with:
          name: BloodPressureTracker-Setup
          path: installer/*.exe

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v1
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: installer/*.exe
          name: "Blood Pressure Tracker ${{ github.ref_name }}"
          body: |
            ## Blood Pressure Tracker
            
            ### Installation:
            1. Download BloodPressureTracker.exe
            2. Run the installer
            3. Launch from Start Menu
            
            ### Requirements:
            - Windows 10/11
            - No Java installation required!
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}