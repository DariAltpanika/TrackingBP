name: jDeploy CI with Maven

on:
  push:
    branches: [ 'main', '*-snapshot' ]
    tags: [ 'v*' ]

concurrency:
  group: jdeploy-release-${{ github.repository }}
  cancel-in-progress: false

jobs:
  build:
    permissions:
      contents: write
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Build with Maven
        run: mvn -B package --file pom.xml

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install jdeploy
        run: npm install -g jdeploy@6.1.1

      - name: Build App Installer Bundles
        run: jdeploy publish --github-repo ${{ github.repository }} --github-token ${{ github.token }}
